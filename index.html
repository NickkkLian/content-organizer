<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>收藏整理库</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    font:16px/1.6 -apple-system,"PingFang SC",system-ui,sans-serif;
    background:#f6f7f9;color:#18191c}
  @media (prefers-color-scheme:dark){body{background:#0f1115;color:#e6e8ea}}
  .card{max-width:520px;padding:40px 32px;text-align:center}
  h1{font-size:30px;margin:.2em 0}
  .tag{display:inline-block;margin:6px 0 18px;padding:3px 12px;border-radius:999px;
    background:#ff244218;color:#ff2442;font-size:13px;font-weight:600}
  p{color:#8a9098;margin:.4em 0}
  .row{margin-top:22px;font-size:14px;color:#8a9098}
  a{color:#ff2442}
</style>
</head>
<body>
  <div class="card">
    <h1>📚 收藏整理库</h1>
    <div class="tag">建设中 · 正在合并小红书 + B站</div>
    <p>小红书(图文 / 视频)+ B站(视频)统一收藏、跨平台 AI 整理。</p>
    <p class="row">很快上线。数据仍在你的私有库,零迁移。</p>
  </div>
</body>
</html>
